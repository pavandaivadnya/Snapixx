<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Snapixx – Discover & Save Ideas</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #faf9f7;
    --surface: #ffffff;
    --border: #ebebeb;
    --text-primary: #111111;
    --text-secondary: #767676;
    --accent: #e60023;
    --accent-dark: #c0001d;
    --accent-soft: #ffeef0;
    --pill-bg: #efefef;
    --pill-hover: #e1e1e1;
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
    --shadow-md: 0 6px 24px rgba(0,0,0,0.13);
    --shadow-lg: 0 16px 48px rgba(0,0,0,0.18);
    --radius: 16px;
    --radius-pill: 50px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* ── NAVBAR ── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    box-shadow: var(--shadow-sm);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    flex-shrink: 0;
  }
  .logo-icon {
    width: 38px; height: 38px;
    background: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 22px; height: 22px; fill: white; }
  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--text-primary);
    letter-spacing: -0.5px;
  }

  .nav-links {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .nav-link {
    padding: 8px 16px;
    border-radius: var(--radius-pill);
    font-size: 0.92rem;
    font-weight: 600;
    text-decoration: none;
    color: var(--text-primary);
    transition: background 0.2s;
    cursor: pointer;
  }
  .nav-link:hover { background: var(--pill-bg); }
  .nav-link.active { background: var(--text-primary); color: white; }

  .search-bar {
    flex: 1;
    position: relative;
    max-width: 680px;
  }
  .search-bar input {
    width: 100%;
    padding: 11px 16px 11px 44px;
    border-radius: var(--radius-pill);
    border: none;
    background: var(--pill-bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--text-primary);
    outline: none;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .search-bar input:focus {
    background: #e8e8e8;
    box-shadow: 0 0 0 2px var(--accent);
  }
  .search-bar .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-secondary);
    pointer-events: none;
  }

  .nav-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .btn-primary {
    padding: 9px 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-pill);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }
  .btn-primary:hover { background: var(--accent-dark); transform: scale(1.03); }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f093fb, #f5576c);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: white; font-size: 0.9rem;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* ── CATEGORY PILLS ── */
  .category-row {
    display: flex;
    gap: 8px;
    padding: 14px 20px;
    overflow-x: auto;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .category-row::-webkit-scrollbar { display: none; }
  .pill {
    padding: 8px 18px;
    border-radius: var(--radius-pill);
    background: var(--pill-bg);
    font-size: 0.88rem;
    font-weight: 500;
    white-space: nowrap;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    border: none;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-primary);
  }
  .pill:hover { background: var(--pill-hover); transform: scale(1.04); }
  .pill.active { background: var(--text-primary); color: white; }

  /* ── MAIN CONTENT ── */
  main {
    padding: 24px 20px;
    max-width: 1600px;
    margin: 0 auto;
  }

  /* ── MASONRY GRID ── */
  .masonry {
    columns: 6 220px;
    column-gap: 12px;
  }

  /* ── PIN CARD ── */
  .pin {
    break-inside: avoid;
    margin-bottom: 12px;
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    cursor: pointer;
    background: var(--surface);
    box-shadow: var(--shadow-sm);
    transition: transform 0.25s cubic-bezier(.25,.8,.25,1), box-shadow 0.25s;
    animation: fadeUp 0.5s both;
  }
  .pin:hover {
    transform: translateY(-4px) scale(1.01);
    box-shadow: var(--shadow-lg);
    z-index: 10;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .pin img {
    width: 100%;
    display: block;
    border-radius: var(--radius) var(--radius) 0 0;
    object-fit: cover;
  }
  .pin.no-label img {
    border-radius: var(--radius);
  }

  /* Hover overlay */
  .pin-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0);
    transition: background 0.25s;
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 10px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .pin:hover .pin-overlay { opacity: 1; background: rgba(0,0,0,0.12); }

  .pin-overlay-top {
    display: flex;
    justify-content: flex-end;
    gap: 6px;
  }
  .pin-overlay-bottom {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .ov-btn {
    padding: 7px 14px;
    border-radius: var(--radius-pill);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .ov-btn:hover { transform: scale(1.06); }
  .ov-save { background: var(--accent); color: white; }
  .ov-saved { background: #333; color: white; }
  .ov-share {
    background: rgba(255,255,255,0.92);
    color: #333;
    width: 32px; height: 32px;
    padding: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    font-size: 1rem;
  }
  .ov-more {
    background: rgba(255,255,255,0.92);
    color: #333;
    width: 32px; height: 32px;
    padding: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    font-size: 1rem;
  }
  .ov-board {
    background: rgba(255,255,255,0.92);
    color: #333;
    font-size: 0.78rem;
    font-weight: 600;
    gap: 5px;
    display: flex; align-items: center;
  }

  /* Pin label */
  .pin-label {
    padding: 10px 12px 12px;
  }
  .pin-label h4 {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pin-label span {
    font-size: 0.78rem;
    color: var(--text-secondary);
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #333;
    color: white;
    padding: 12px 24px;
    border-radius: var(--radius-pill);
    font-size: 0.9rem;
    font-weight: 500;
    z-index: 999;
    transition: transform 0.35s cubic-bezier(.25,.8,.25,1);
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── MODAL ── */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 200;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.2s;
  }
  .modal-bg.open { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--surface);
    border-radius: 20px;
    max-width: 860px;
    width: 95%;
    max-height: 90vh;
    overflow: hidden;
    display: flex;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.3s cubic-bezier(.25,.8,.25,1);
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .modal-img {
    width: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }
  .modal-body {
    padding: 32px;
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .modal-body h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1.3;
  }
  .modal-body p {
    font-size: 0.93rem;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .modal-meta {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .modal-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    object-fit: cover;
  }
  .modal-meta-text { font-size: 0.85rem; }
  .modal-meta-text strong { display: block; }
  .modal-meta-text span { color: var(--text-secondary); }
  .modal-actions { display: flex; gap: 10px; margin-top: auto; }
  .btn-secondary {
    padding: 10px 22px;
    border-radius: var(--radius-pill);
    border: 2px solid var(--border);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-secondary:hover { background: var(--pill-bg); }
  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.9);
    border: none;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
    transition: background 0.2s;
  }
  .modal-close:hover { background: var(--pill-hover); }

  /* ── CREATE PIN MODAL ── */
  .create-modal {
    max-width: 700px;
    flex-direction: column;
    padding: 32px;
    gap: 20px;
  }
  .create-modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
  }
  .create-modal .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 40px;
    text-align: center;
    color: var(--text-secondary);
    background: var(--bg);
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
  }
  .create-modal .upload-zone:hover {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .create-modal .upload-zone .upload-icon { font-size: 2.5rem; margin-bottom: 8px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 0.85rem; font-weight: 600; }
  .form-group input, .form-group textarea, .form-group select {
    padding: 10px 14px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.93rem;
    background: var(--bg);
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    border-color: var(--accent);
  }
  .create-actions { display: flex; justify-content: flex-end; gap: 10px; }

  /* ── HERO BANNER ── */
  .hero {
    position: relative;
    width: 100%;
    overflow: hidden;
    cursor: pointer;
  }
  .hero img {
    width: 100%;
    height: 420px;
    object-fit: cover;
    object-position: center top;
    display: block;
    transition: transform 0.6s ease;
  }
  .hero:hover img { transform: scale(1.03); }
  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.0) 30%, rgba(0,0,0,0.45) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 36px;
    gap: 14px;
  }
  .hero-badges {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .hero-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 50px;
    padding: 7px 16px;
    color: white;
    font-size: 0.82rem;
    font-weight: 600;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .hero-cta {
    padding: 13px 38px;
    background: linear-gradient(135deg, #f7971e, #e6003a);
    color: white;
    border: none;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    box-shadow: 0 6px 28px rgba(230,0,35,0.5);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .hero-cta:hover {
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 12px 36px rgba(230,0,35,0.6);
  }

  /* responsive tweaks */
  @media (max-width: 768px) {
    .nav-links { display: none; }
    .modal { flex-direction: column; }
    .modal-img { width: 100%; height: 200px; }
    .masonry { columns: 2 160px; }
  }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav>

const PINS = [

  { id:3, img:"https://images.unsplash.com/photo-1476224203421-9ac39bcb3327?w=400&q=80", title:"Avocado Toast Board", user:"Priya S.", board:"Food Goals", desc:"The ultimate weekend brunch spread with vibrant toppings.", category:"Food", h:300 },
  { id:4, img:"https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&q=80", title:"Swiss Alps Sunrise", user:"Marco R.", board:"Travel Dreams", desc:"First light over the misty Swiss Alps — pure magic.", category:"Travel", h:380 },
  { id:5, img:"https://images.unsplash.com/photo-1529665253569-6d01c0eaf7b6?w=400&q=80", title:"Street Style Fit", user:"Zara K.", board:"Fashion Mood", desc:"Effortless layering with a pop of color — autumn street style.", category:"Fashion", h:340 },

let savedPins = new Set();
let activeCategory = 'All';
let searchQuery = '';
let currentPin = null;

function getFiltered() {
  return PINS.filter(p => {
    const matchCat = activeCategory === 'All' || p.category === activeCategory;
    const q = searchQuery.toLowerCase();
    const matchQ = !q || p.title.toLowerCase().includes(q) || p.category.toLowerCase().includes(q) || p.user.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const pins = getFiltered();
  grid.innerHTML = '';
  pins.forEach((p, i) => {
    const saved = savedPins.has(p.id);
    const hasLabel = true;
    const div = document.createElement('div');
    div.className = 'pin';
    div.style.animationDelay = (i * 0.04) + 's';
    div.innerHTML = `
      <img src="${p.img}" alt="${p.title}" style="height:${p.h}px" loading="lazy" />
      <div class="pin-overlay">
        <div class="pin-overlay-top">
          <button class="ov-btn ov-board">${p.board}</button>
          <button class="ov-btn ${saved ? 'ov-saved':'ov-save'}" onclick="toggleSave(event,${p.id})">${saved ? 'Saved':'Save'}</button>
        </div>
        <div class="pin-overlay-bottom">
          <button class="ov-btn ov-share" title="Share">⬆</button>
          <button class="ov-btn ov-more" title="More">•••</button>
        </div>
      </div>
      <div class="pin-label">
        <h4>${p.title}</h4>
        <span>${p.user}</span>
      </div>
    `;
    div.addEventListener('click', (e) => {
      if (e.target.closest('.ov-btn')) return;
      openPin(p);
    });
    grid.appendChild(div);
  });
}

function toggleSave(e, id) {
  e.stopPropagation();
  const btn = e.currentTarget;
  if (savedPins.has(id)) {
    savedPins.delete(id);
    btn.textContent = 'Save';
    btn.className = 'ov-btn ov-save';
    showToast('Removed from board');
  } else {
    savedPins.add(id);
    btn.textContent = 'Saved';
    btn.className = 'ov-btn ov-saved';
    showToast('✓ Saved to board!');
  }
  if (currentPin && currentPin.id === id) {
    const mb = document.getElementById('modalSaveBtn');
    mb.textContent = savedPins.has(id) ? 'Saved ✓' : 'Save';
    mb.style.background = savedPins.has(id) ? '#333' : '';
  }
}

function openPin(p) {
  currentPin = p;
  document.getElementById('modalImg').src = p.img;
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalDesc').textContent = p.desc;
  document.getElementById('modalUser').textContent = p.user;
  document.getElementById('modalBoard').textContent = p.board;
  document.getElementById('modalAvatar').textContent = p.user[0];
  const sb = document.getElementById('modalSaveBtn');
  sb.textContent = savedPins.has(p.id) ? 'Saved ✓' : 'Save';
  sb.style.background = savedPins.has(p.id) ? '#333' : '';
  document.getElementById('pinModal').classList.add('open');
}

function modalSave() {
  if (!currentPin) return;
  if (savedPins.has(currentPin.id)) {
    savedPins.delete(currentPin.id);
    document.getElementById('modalSaveBtn').textContent = 'Save';
    document.getElementById('modalSaveBtn').style.background = '';
    showToast('Removed from board');
  } else {
    savedPins.add(currentPin.id);
    document.getElementById('modalSaveBtn').textContent = 'Saved ✓';
    document.getElementById('modalSaveBtn').style.background = '#333';
    showToast('✓ Saved to board!');
  }
  renderGrid();
}

function closePinModal(e) {
  if (e.target === document.getElementById('pinModal')) {
    document.getElementById('pinModal').classList.remove('open');
  }
}

function openCreate() { document.getElementById('createModal').classList.add('open'); }
function closeCreateModal(e) {
  if (e.target === document.getElementById('createModal')) {
    document.getElementById('createModal').classList.remove('open');
  }
}

function saveNewPin() {
  document.getElementById('createModal').classList.remove('open');
  showToast('📌 Your Pin is live!');
}

function setCategory(btn, cat) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  activeCategory = cat;
  renderGrid();
}

function filterPins() {
  searchQuery = document.getElementById('searchInput').value;
  renderGrid();
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

renderGrid();
</script>
